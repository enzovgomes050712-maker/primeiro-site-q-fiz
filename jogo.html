<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Explosão</title>
    <link rel="stylesheet" href="3style.css">
</head>

<body>

<a href="index.html" class="btn-voltar">VOLTAR</a>

<img id="personagem" src="https://m.media-amazon.com/images/I/61jZr1H9BvS._AC_UL960_QL65_.jpg">

<div id="explosaoTela" style="display:none;">
  <img src="images/explosao.gif">
</div>

<img id="imagemFinal" src="images/explodiu.png" style="display:none;">

<a href="index.html" id="btnFinal" style="display:none;">VOLTAR AO SITE</a>

<audio id="somExplosao" src="audios/explosao.mp3"></audio>

<script>
const personagem = document.getElementById("personagem");
const explosaoTela = document.getElementById("explosaoTela");
const imagemFinal = document.getElementById("imagemFinal");
const btnFinal = document.getElementById("btnFinal");
const som = document.getElementById("somExplosao");

let jaExplodiu = false;

personagem.style.position = "absolute";
personagem.style.left = (window.innerWidth/2 - 40) + "px";
personagem.style.top = (window.innerHeight/2 - 40) + "px";

document.addEventListener("mousemove", (e) => {
  if (jaExplodiu) return;

  let x = e.clientX - 40;
  let y = e.clientY - 40;

  personagem.style.left = x + "px";
  personagem.style.top = y + "px";
  criarRastro(x, y);  
  if (
    x <= 0 ||
    y <= 0 ||
    x + personagem.width >= window.innerWidth ||
    y + personagem.height >= window.innerHeight
  ) {
    explodir();
  }
});

function explodir() {
  jaExplodiu = true;

  personagem.style.display = "none";

  explosaoTela.style.display = "flex";

  som.volume = 1.0;
  som.currentTime = 0;
  som.play().catch(e => console.log(e));

  document.body.classList.add("tremer");

  setTimeout(() => {
    explosaoTela.style.display = "none";
    document.body.classList.remove("tremer");

    imagemFinal.style.display = "block";
    btnFinal.style.display = "block";
  }, 2500);
}

function criarRastro(x, y) {
  const clone = personagem.cloneNode(true);

  clone.classList.add("rastro");
  clone.style.left = x + "px";
  clone.style.top = y + "px";

  document.body.appendChild(clone);

  // depois de 3 segundos começa a sumir
  setTimeout(() => {
    clone.classList.add("sumir");
  }, 1000);

  // remove completamente depois de 4.5 segundos
  setTimeout(() => {
    clone.remove();
  }, 4500);
}
</script>

</body>
</html>
